{% extends 'core/base.html' %}
{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4 py-12">
    <div
        class="w-full max-w-2xl bg-white dark:bg-[#0a0a0a] border border-gray-200 dark:border-gray-800 rounded-2xl shadow-xl p-8 md:p-10">
        <h2 class="text-3xl font-bold text-gray-900 dark:text-white mb-2 text-center">Initialize Profile</h2>
        <p class="text-sm text-gray-500 dark:text-gray-400 mb-8 text-center">Define your parameters for the network.</p>

        <form method="POST" class="space-y-6">
            {% csrf_token %}

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1 uppercase">System ID
                            (Username)</label>
                        <input type="text" name="username" required
                            class="w-full p-3 bg-gray-50 dark:bg-[#111] border border-gray-200 dark:border-gray-800 rounded outline-none focus:border-brand-light transition text-gray-900 dark:text-white">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1 uppercase">Recovery
                            Email</label>
                        <input type="email" name="email" required
                            class="w-full p-3 bg-gray-50 dark:bg-[#111] border border-gray-200 dark:border-gray-800 rounded outline-none focus:border-brand-light transition text-gray-900 dark:text-white">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1 uppercase">Career
                            Field</label>
                        <select name="career"
                            class="w-full p-3 bg-gray-50 dark:bg-[#111] border border-gray-200 dark:border-gray-800 rounded outline-none focus:border-brand-light transition text-gray-900 dark:text-white">
                            <option value="DevOps">DevOps / Infrastructure</option>
                            <option value="Software Engineer">Software Engineer</option>
                            <option value="MLOps">MLOps / Data Science</option>
                            <option value="Executive">Executive / Management</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-4">
                    <div>
                        <label
                            class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1 uppercase">Country</label>
                        <input type="text" name="country" required placeholder="e.g. Nigeria"
                            class="w-full p-3 bg-gray-50 dark:bg-[#111] border border-gray-200 dark:border-gray-800 rounded outline-none focus:border-brand-light transition text-gray-900 dark:text-white">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1 uppercase">Primary
                            Language</label>
                        <input type="text" name="language" required placeholder="e.g. English"
                            class="w-full p-3 bg-gray-50 dark:bg-[#111] border border-gray-200 dark:border-gray-800 rounded outline-none focus:border-brand-light transition text-gray-900 dark:text-white">
                    </div>

                    <div class="relative">
                        <label
                            class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1 uppercase">Cryptographic
                            Key</label>
                        <input type="password" id="reg-password" name="password" required
                            class="w-full p-3 bg-gray-50 dark:bg-[#111] border border-gray-200 dark:border-gray-800 rounded outline-none focus:border-brand-light transition text-gray-900 dark:text-white pr-10">
                        <button type="button" onclick="togglePassword('reg-password')"
                            class="absolute right-3 top-8 text-gray-500 hover:text-brand-light">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z">
                                </path>
                            </svg>
                        </button>
                    </div>
                    <div class="relative">
                        <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1 uppercase">Verify
                            Key</label>
                        <input type="password" id="reg-password-confirm" name="password_confirm" required
                            class="w-full p-3 bg-gray-50 dark:bg-[#111] border border-gray-200 dark:border-gray-800 rounded outline-none focus:border-brand-light transition text-gray-900 dark:text-white">
                    </div>
                </div>
            </div>

            <button type="submit"
                class="w-full py-4 mt-6 bg-brand-light text-white rounded font-bold hover:bg-brand transition shadow-lg text-lg">Generate
                Network Profile</button>
        </form>
    </div>
</div>

<script>
    function togglePassword(fieldId) {
        const input = document.getElementById(fieldId);
        if (input.type === "password") { input.type = "text"; }
        else { input.type = "password"; }
    }
</script>
{% endblock %}

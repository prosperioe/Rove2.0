{% extends 'core/base.html' %}
{% block content %}
<div class="min-h-[85vh] flex items-center justify-center px-4 py-16">
    <div class="card-3d w-full max-w-2xl bg-white dark:bg-[#0a0a0a] border border-gray-200 dark:border-gray-800 rounded-2xl shadow-xl p-8 md:p-10 reveal">

        <div class="text-center mb-10">
            <a href="{% url 'home' %}" class="text-2xl font-bold tracking-tighter text-gray-900 dark:text-white">ROVE.</a>
            <h2 class="text-2xl font-bold text-gray-900 dark:text-white mt-4 mb-1">Create Your Account</h2>
            <p class="text-sm text-gray-500 dark:text-gray-400">Join the ROVE platform to access downloads, API keys, and your client dashboard.</p>
        </div>

        <form method="POST" class="space-y-6">
            {% csrf_token %}

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1.5">Username</label>
                        <input type="text" name="username" required autocomplete="username"
                            class="w-full p-3 bg-gray-50 dark:bg-[#111] border border-gray-200 dark:border-gray-800 rounded-lg outline-none focus:border-brand-light focus:ring-1 focus:ring-brand-light/20 transition text-gray-900 dark:text-white text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1.5">Email Address</label>
                        <input type="email" name="email" required autocomplete="email"
                            class="w-full p-3 bg-gray-50 dark:bg-[#111] border border-gray-200 dark:border-gray-800 rounded-lg outline-none focus:border-brand-light focus:ring-1 focus:ring-brand-light/20 transition text-gray-900 dark:text-white text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1.5">Professional Field</label>
                        <select name="career"
                            class="w-full p-3 bg-gray-50 dark:bg-[#111] border border-gray-200 dark:border-gray-800 rounded-lg outline-none focus:border-brand-light focus:ring-1 focus:ring-brand-light/20 transition text-gray-900 dark:text-white text-sm">
                            <option value="DevOps">DevOps / Infrastructure</option>
                            <option value="Software Engineer">Software Engineer</option>
                            <option value="MLOps">MLOps / Data Science</option>
                            <option value="Executive">Executive / Management</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1.5">Country</label>
                        <input type="text" name="country" required placeholder="e.g. Nigeria" autocomplete="country-name"
                            class="w-full p-3 bg-gray-50 dark:bg-[#111] border border-gray-200 dark:border-gray-800 rounded-lg outline-none focus:border-brand-light focus:ring-1 focus:ring-brand-light/20 transition text-gray-900 dark:text-white text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1.5">Primary Language</label>
                        <input type="text" name="language" required placeholder="e.g. English" autocomplete="language"
                            class="w-full p-3 bg-gray-50 dark:bg-[#111] border border-gray-200 dark:border-gray-800 rounded-lg outline-none focus:border-brand-light focus:ring-1 focus:ring-brand-light/20 transition text-gray-900 dark:text-white text-sm">
                    </div>
                    <div class="relative">
                        <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1.5">Password</label>
                        <input type="password" id="reg-password" name="password" required autocomplete="new-password"
                            class="w-full p-3 bg-gray-50 dark:bg-[#111] border border-gray-200 dark:border-gray-800 rounded-lg outline-none focus:border-brand-light focus:ring-1 focus:ring-brand-light/20 transition text-gray-900 dark:text-white text-sm pr-10">
                        <button type="button" onclick="togglePassword('reg-password')" class="absolute right-3 top-9 text-gray-400 hover:text-brand-light transition-colors" aria-label="Show password">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                            </svg>
                        </button>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1.5">Confirm Password</label>
                        <input type="password" id="reg-password-confirm" name="password_confirm" required autocomplete="new-password"
                            class="w-full p-3 bg-gray-50 dark:bg-[#111] border border-gray-200 dark:border-gray-800 rounded-lg outline-none focus:border-brand-light focus:ring-1 focus:ring-brand-light/20 transition text-gray-900 dark:text-white text-sm">
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-primary w-full py-4 mt-2 bg-brand-light text-white rounded-xl font-bold hover:bg-brand-dark transition-colors shadow-lg text-sm">
                Create Account
            </button>
        </form>

        <p class="text-center text-sm text-gray-500 dark:text-gray-400 mt-6">
            Already have an account? <a href="{% url 'login' %}" class="text-brand-light font-semibold hover:underline">Sign in</a>
        </p>
    </div>
</div>

<script>
    function togglePassword(fieldId) {
        const input = document.getElementById(fieldId);
        input.type = input.type === 'password' ? 'text' : 'password';
    }
</script>
{% endblock %}
